services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-repo-postgres
    environment:
      POSTGRES_DB: ai_repo
      POSTGRES_USER: ai_repo
      POSTGRES_PASSWORD: ai_repo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_repo -d ai_repo"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ai-repo-postgres-data:/var/lib/postgresql/data

volumes:
  ai-repo-postgres-data:
