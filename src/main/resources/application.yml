spring:
  application:
    name: ai-repo
  flyway:
    enabled: false
  sql:
    init:
      mode: never

server:
  port: 8080

ai-repo:
  ops:
    admin-token: ${AI_REPO_OPS_ADMIN_TOKEN:local-ops-token}
  outbox-relay:
    scheduler:
      enabled: ${AI_REPO_OUTBOX_RELAY_SCHEDULER_ENABLED:false}
      batch-size: ${AI_REPO_OUTBOX_RELAY_BATCH_SIZE:10}
      initial-delay-ms: ${AI_REPO_OUTBOX_RELAY_INITIAL_DELAY_MS:5000}
      fixed-delay-ms: ${AI_REPO_OUTBOX_RELAY_FIXED_DELAY_MS:5000}
  operational-log-pruning:
    relay-run-retention-days: ${AI_REPO_OPERATIONAL_LOG_PRUNING_RELAY_RUN_RETENTION_DAYS:30}
    admin-access-audit-retention-days: ${AI_REPO_OPERATIONAL_LOG_PRUNING_ADMIN_ACCESS_AUDIT_RETENTION_DAYS:180}
    scheduler:
      enabled: ${AI_REPO_OPERATIONAL_LOG_PRUNING_SCHEDULER_ENABLED:false}
      initial-delay-ms: ${AI_REPO_OPERATIONAL_LOG_PRUNING_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${AI_REPO_OPERATIONAL_LOG_PRUNING_FIXED_DELAY_MS:86400000}
