spring:
  application:
    name: ai-repo
  flyway:
    enabled: false
  sql:
    init:
      mode: never

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

ai-repo:
  ops:
    admin-token: ${AI_REPO_OPS_ADMIN_TOKEN:local-ops-token}
  outbox:
    publisher:
      type: ${AI_REPO_OUTBOX_PUBLISHER_TYPE:memory}
      http:
        endpoint: ${AI_REPO_OUTBOX_PUBLISHER_HTTP_ENDPOINT:http://127.0.0.1:18080/outbox-events}
        timeout-ms: ${AI_REPO_OUTBOX_PUBLISHER_HTTP_TIMEOUT_MS:3000}
  outbox-relay:
    scheduler:
      enabled: ${AI_REPO_OUTBOX_RELAY_SCHEDULER_ENABLED:false}
      batch-size: ${AI_REPO_OUTBOX_RELAY_BATCH_SIZE:10}
      initial-delay-ms: ${AI_REPO_OUTBOX_RELAY_INITIAL_DELAY_MS:5000}
      fixed-delay-ms: ${AI_REPO_OUTBOX_RELAY_FIXED_DELAY_MS:5000}
    health:
      sample-size: ${AI_REPO_OUTBOX_RELAY_HEALTH_SAMPLE_SIZE:20}
      warning-consecutive-failures: ${AI_REPO_OUTBOX_RELAY_HEALTH_WARNING_CONSECUTIVE_FAILURES:2}
      critical-consecutive-failures: ${AI_REPO_OUTBOX_RELAY_HEALTH_CRITICAL_CONSECUTIVE_FAILURES:3}
      warning-failure-rate-percent: ${AI_REPO_OUTBOX_RELAY_HEALTH_WARNING_FAILURE_RATE_PERCENT:50}
      critical-last-success-age-minutes: ${AI_REPO_OUTBOX_RELAY_HEALTH_CRITICAL_LAST_SUCCESS_AGE_MINUTES:15}
  operational-log-pruning:
    relay-run-retention-days: ${AI_REPO_OPERATIONAL_LOG_PRUNING_RELAY_RUN_RETENTION_DAYS:30}
    admin-access-audit-retention-days: ${AI_REPO_OPERATIONAL_LOG_PRUNING_ADMIN_ACCESS_AUDIT_RETENTION_DAYS:180}
    scheduler:
      enabled: ${AI_REPO_OPERATIONAL_LOG_PRUNING_SCHEDULER_ENABLED:false}
      initial-delay-ms: ${AI_REPO_OPERATIONAL_LOG_PRUNING_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${AI_REPO_OPERATIONAL_LOG_PRUNING_FIXED_DELAY_MS:86400000}
