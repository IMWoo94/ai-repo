name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: read

jobs:
  gradle-check:
    name: Gradle Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run check
        run: ./gradlew check

  scenario-test:
    name: Scenario Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run scenario tests
        run: ./gradlew scenarioTest
