name: 버그 수정
description: 재현 가능한 결함과 회귀 테스트 기준을 정의합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: 증상
      description: 사용자가 본 문제를 구체적으로 작성합니다.
      placeholder: 예) 잔액 조회 결과가 특정 거래 이후 기대값과 다르게 표시된다.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 절차
      description: 가능한 한 순서대로 작성합니다.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 기대 결과와 실제 결과
      value: |
        ### 기대 결과
        -

        ### 실제 결과
        -
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 도메인 규칙, 금액, 거래내역, 릴리스 영향이 있는지 작성합니다.
      placeholder: |
        - 영향받는 기능:
        - 도메인 규칙 영향:
        - 데이터 정합성 영향:
    validations:
      required: true

  - type: checkboxes
    id: regression
    attributes:
      label: 회귀 테스트 기준
      description: ADR-0002에 따라 실패 재현 테스트를 먼저 추가합니다.
      options:
        - label: 실패를 재현하는 테스트를 먼저 작성한다.
          required: true
        - label: 수정 후 기존 테스트와 신규 회귀 테스트가 통과해야 한다.
          required: true
        - label: 도메인 규칙 변경이 있으면 ADR 또는 Wiki에 기록한다.
